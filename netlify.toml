[build]
  base = "."
  package = "apps/web"
  command = "npm install -w apps/web -w packages/eslint-config -w packages/tsconfig -w packages/types && npm run build:web"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https: http:; connect-src 'self' https://nexta-api-production.up.railway.app https://api-staging.gimbi.com.au wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/brand/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Credentials = "true"
    Access-Control-Allow-Headers = "Authorization, Content-Type"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Origin = "https://nexta.life"

[[redirects]]
  from = "/api/neon/*"
  status = 200
  # Let Next.js handle Neon-powered routes (no external redirect)

[[redirects]]
  from = "/api/*"
  to = "https://nexta-api-production.up.railway.app/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "/api/neon/health"
  status = 200

[[redirects]]
  from = "https://www.nexta.life/*"
  to = "https://nexta.life/:splat"
  status = 301
  force = true
